spring.application.name=indigo-smart-travel-platform

spring.datasource.url=jdbc:h2:mem:indigoDB
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email Configuration (for production, update with actual SMTP settings)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@indigo.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
